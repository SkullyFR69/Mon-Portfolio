<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduction pixel perfect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header,
        footer {
            background: #eaeaea;
            color: black;
            text-align: center;
            padding: 20px;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        .container {
            position: relative;
            width: 400px;
            height: 250px;
            border: 3px solid black;
            background: white;
        }

        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            background: red;
        }

        .top-left {
            top: 0;
            left: 0;
        }

        .top-right {
            top: 0;
            right: 0;
        }

        .bottom-left {
            bottom: 0;
            left: 0;
        }

        .bottom-right {
            bottom: 0;
            right: 0;
        }

        .yellow-corner {
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            border-left: 20px solid yellow;
            border-bottom: 20px solid yellow;
            box-sizing: border-box;
        }

        .innerbox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 290px;
            height: 50px;
            border: 2px solid green;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: white;
        }

        .green {
            width: 50px;
            height: 50px;
            background: green;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <header>
        <h1>En-tête de page</h1>
    </header>

    <main>
        <div class="container">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            <div class="yellow-corner"></div>
            <div class="innerbox">
                <div class="green"></div>
                <div class="green"></div>
                <div class="green"></div>
            </div>
        </div>
    </main>
</body>

</html>
